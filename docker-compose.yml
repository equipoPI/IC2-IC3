version: '3.8'

services:
  # Base de datos PostgreSQL
  db:
    image: postgres:15
    container_name: scada_postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=ic3_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scada_network

  # Backend Django + DRF
  backend:
    build:
      context: ./mysite
      dockerfile: Dockerfile
    container_name: scada_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./mysite:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ic3_db
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
    depends_on:
      db:
        condition: service_healthy
    networks:
      - scada_network

  # Frontend React + Vite
  frontend:
    build:
      context: ./scada-ui
      dockerfile: Dockerfile
    container_name: scada_frontend
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./scada-ui:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
      - WATCHPACK_POLLING=true
    depends_on:
      - backend
    networks:
      - scada_network

  # Broker MQTT - Mosquitto
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: scada_mqtt_broker
    ports:
      - "1883:1883"      # Puerto MQTT
      - "9001:9001"      # Puerto WebSocket (opcional para MQTT sobre WS)
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
      - mosquitto_data:/mosquitto/data
    networks:
      - scada_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 | grep -v Error || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  mosquitto_data:

networks:
  scada_network:
    driver: bridge