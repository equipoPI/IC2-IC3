# Mosquitto MQTT Broker Configuration
# Sistema SCADA - Configuración para Raspberry Pi Gateway

# ==============================================================================
# CONFIGURACIÓN GENERAL
# ==============================================================================

# ID del broker
#clientid_prefixes scada_

# Persistencia de datos
persistence true
persistence_location /mosquitto/data/

# Archivo de log
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Timestamps en logs
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# ==============================================================================
# CONFIGURACIÓN DE RED
# ==============================================================================

# Listener MQTT estándar (para Raspberry Pi)
listener 1883
protocol mqtt

# Permitir conexiones anónimas (cambiar a false en producción)
allow_anonymous true

# Listener WebSocket (para navegadores web - opcional)
listener 9001
protocol websockets

# ==============================================================================
# AUTENTICACIÓN (Descomentar para habilitar)
# ==============================================================================

# Para habilitar autenticación:
# 1. Descomentar las siguientes líneas
# 2. Crear archivo de contraseñas con: docker-compose exec mosquitto mosquitto_passwd -c /mosquitto/config/passwd scada_user
# 3. Reiniciar: docker-compose restart mosquitto

# allow_anonymous false
# password_file /mosquitto/config/passwd

# ==============================================================================
# CONTROL DE ACCESO (ACL) - Opcional
# ==============================================================================

# acl_file /mosquitto/config/acl.conf

# ==============================================================================
# CONFIGURACIÓN DE CONEXIÓN
# ==============================================================================

# Máximo número de clientes
max_connections -1

# Timeout de conexión inactiva (segundos)
# -1 = sin timeout
max_keepalive 60

# Tamaño máximo de paquete (bytes)
message_size_limit 0

# Máximo de mensajes en cola por cliente
max_queued_messages 1000

# ==============================================================================
# MENSAJES RETENIDOS Y QoS
# ==============================================================================

# Máximo de mensajes retained
max_inflight_messages 20

# Persistir mensajes QoS 1 y 2
queue_qos0_messages false

# ==============================================================================
# CONFIGURACIÓN DE SISTEMA ($SYS)
# ==============================================================================

# Intervalo de publicación de mensajes de sistema (segundos)
sys_interval 10

# ==============================================================================
# CONFIGURACIÓN DE PUENTES (BRIDGES) - Para conectar con otros brokers
# ==============================================================================

# Ejemplo: Conectar con un broker en la nube
# connection bridge-to-cloud
# address broker.hivemq.com:1883
# topic scada/# both 0
# cleansession true
# notifications false
# try_private false

# ==============================================================================
# LÍMITES Y SEGURIDAD
# ==============================================================================

# Limitar tasa de mensajes por cliente (mensajes/segundo)
# max_publish_rate 10

# Máximo de suscripciones por cliente
# max_subscriptions 100
